# ─────────────────────────────────────────────────────────────────────────────
# SECRET — like a ConfigMap but base64-encoded and access-controlled.
# ─────────────────────────────────────────────────────────────────────────────
# What: Stores sensitive data (passwords, tokens, keys).
# Why:  K8s treats Secrets differently from ConfigMaps:
#         • stored encrypted at rest (when etcd encryption is on)
#         • access controlled via RBAC
#         • not printed in kubectl describe output
# Without it: You'd put passwords in the ConfigMap or Deployment — visible
#             in plain text to anyone with kubectl access.
#
# NOTE: Values here are base64 of "snaplink" — NOT encryption, just encoding.
# In production, use external-secrets or Vault instead of committing this file.
# Generate your own: echo -n 'yourpassword' | base64
apiVersion: v1
kind: Secret
metadata:
  name: snaplink-secret
  namespace: snaplink
type: Opaque
data:
  # echo -n 'snaplink' | base64  →  c25hcGxpbms=
  SPRING_DATASOURCE_USERNAME: c25hcGxpbms=
  SPRING_DATASOURCE_PASSWORD: c25hcGxpbms=
  POSTGRES_USER: c25hcGxpbms=
  POSTGRES_PASSWORD: c25hcGxpbms=
