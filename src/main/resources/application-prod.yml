server:
  port: 8080

spring:
  datasource:
    url: ${DATABASE_URL}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true

  data:
    redis:
      url: ${REDIS_URL}

logging:
  level:
    com.snaplink: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{requestId}] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

snaplink:
  base-url: ${BASE_URL:https://snplnk.io}
  default-rate-limit: 100
  cache:
    url-ttl-hours: 24
    stats-ttl-minutes: 5
